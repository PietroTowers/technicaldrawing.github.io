<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piero Gomez Torres — Galería</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════
     VARIABLES
     ══════════════════════════════════════ */
  :root {
    --bg:         #f4f6fb;
    --surface:    #ffffff;
    --surface2:   #eef1f8;
    --grad:       linear-gradient(135deg, #4f8ef7, #a855f7);
    --grad-soft:  linear-gradient(135deg, rgba(79,142,247,0.12), rgba(168,85,247,0.12));
    --blue:       #4f8ef7;
    --purple:     #a855f7;
    --text:       #1a1d2e;
    --text-mid:   #5a5f7a;
    --text-soft:  #9499b8;
    --border:     #e2e6f3;
    --shadow:     0 2px 16px rgba(79,142,247,0.08);
    --shadow-lg:  0 8px 40px rgba(79,142,247,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* utilidad: borde degradado */
  .grad-border {
    position: relative;
    background: var(--surface);
    border-radius: 14px;
  }
  .grad-border::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 14px;
    padding: 1.5px;
    background: var(--grad);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* ══════════════════════════════════════
     PANTALLA DE INICIO
     ══════════════════════════════════════ */
  #splash {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.5s ease, visibility 0.5s;
    /* fondo con puntos suaves */
    background-image: radial-gradient(circle, rgba(79,142,247,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .splash-card {
    text-align: center;
    padding: 3.5rem 4rem;
    max-width: 460px; width: 92vw;
    background: var(--grad);
    border-radius: 20px;
    box-shadow: 0 12px 60px rgba(79,142,247,0.35);
    position: relative;
    animation: splashIn 0.7s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes splashIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .splash-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2rem;
    animation: floatAvatar 3s ease-in-out infinite;
  }
  @keyframes floatAvatar {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  .splash-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 0.3rem;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .splash-sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.8);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    font-weight: 500;
  }
  .splash-divider {
    height: 1px;
    background: rgba(255,255,255,0.3);
    margin-bottom: 2.5rem;
    border-radius: 99px;
  }

  .btn-iniciar {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 0.85rem 3rem;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.6);
    color: #fff;
    cursor: pointer;
    border-radius: 99px;
    backdrop-filter: blur(8px);
    transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .btn-iniciar:hover {
    background: rgba(255,255,255,0.35);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .btn-iniciar:active { transform: translateY(0); }

  .splash-version {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.55);
    margin-top: 2rem;
    letter-spacing: 1px;
  }

  /* ══════════════════════════════════════
     APP
     ══════════════════════════════════════ */
  #app { display: none; }
  #app.visible { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── HEADER ── */
  header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2.5rem;
    height: 66px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 12px rgba(79,142,247,0.07);
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--grad);
    flex-shrink: 0;
  }

  .header-right {
    font-size: 0.72rem;
    color: var(--text-soft);
    text-align: right;
    line-height: 1.7;
    font-weight: 500;
  }
  #clock {
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 1.25rem 2.5rem;
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .toolbar-label {
    font-size: 0.7rem;
    color: var(--text-soft);
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .categories { display: flex; gap: 0.5rem; flex-wrap: wrap; flex: 1; }

  .cat-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.4rem 1.1rem;
    background: var(--surface2);
    border: 1.5px solid transparent;
    color: var(--text-mid);
    cursor: pointer;
    border-radius: 99px;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cat-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: rgba(79,142,247,0.07);
  }
  .cat-btn.active {
    background: var(--grad);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 3px 12px rgba(79,142,247,0.3);
  }

  .upload-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.45rem 1.2rem;
    background: transparent;
    border: 1.5px solid var(--purple);
    color: var(--purple);
    cursor: pointer;
    border-radius: 99px;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
    letter-spacing: 0.3px;
  }
  .upload-btn:hover {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 4px 16px rgba(168,85,247,0.3);
  }

  /* ── GALLERY ── */
  .gallery-wrap { padding: 2rem 2.5rem; }
  .section-header {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-soft);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .section-header::after {
    content: ''; flex: 1; height: 1.5px;
    background: var(--grad); opacity: 0.2; border-radius: 99px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1.5rem;
  }

  /* ── CARD con zoom al hover ── */
  .card {
    background: var(--surface);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    box-shadow: var(--shadow);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    animation: cardIn 0.4s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* al pasar el mouse: zoom suave + borde degradado */
  .card:hover {
    border-color: transparent;
    box-shadow: 0 8px 32px rgba(79,142,247,0.18);
    transform: translateY(-4px) scale(1.02);
  }
  .card::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 14px;
    padding: 1.5px;
    background: var(--grad);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .card:hover::after { opacity: 1; }

  .card-img-wrap {
    width: 100%; aspect-ratio: 4/3;
    background: var(--surface2);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 10px;
    /* zoom de la imagen al hover de la card */
    transition: transform 0.45s cubic-bezier(.22,1,.36,1);
  }
  .card:hover .card-img-wrap img {
    transform: scale(1.1);
  }

  .card-info {
    padding: 0.85rem 1rem;
    border-top: 1px solid var(--border);
  }
  .card-title {
    font-weight: 600; font-size: 0.9rem; color: var(--text);
    margin-bottom: 0.35rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { display: flex; justify-content: space-between; align-items: center; }
  .card-cat {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .card-date { font-size: 0.62rem; color: var(--text-soft); font-weight: 500; }

  .delete-hint {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, rgba(79,142,247,0.92), rgba(168,85,247,0.92));
    color: #fff;
    font-size: 0.72rem; font-weight: 600;
    text-align: center;
    padding: 0.5rem;
    letter-spacing: 0.5px;
    opacity: 0;
    transform: translateY(100%);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    border-radius: 0 0 14px 14px;
  }
  .delete-hint.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ══════════════════════════════════════
     LIGHTBOX — animación de apertura
     ══════════════════════════════════════ */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,10,30,0.88);
    backdrop-filter: blur(10px);
    z-index: 500;
    align-items: center; justify-content: center; flex-direction: column;
  }
  .lightbox.open { display: flex; }

  .lb-img-wrap {
    position: relative;
    animation: lbZoomIn 0.4s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes lbZoomIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lb-img {
    max-width: 96vw; max-height: 92vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 20px 80px rgba(79,142,247,0.25), 0 0 0 1.5px rgba(168,85,247,0.4);
    display: block;
  }

  .lb-caption {
    margin-top: 1.2rem;
    font-size: 0.78rem;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    animation: lbZoomIn 0.4s 0.1s cubic-bezier(.22,1,.36,1) both;
  }

  .lb-close {
    position: fixed; top: 1.5rem; right: 1.5rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    font-size: 0.8rem; font-weight: 600;
    padding: 0.5rem 1rem;
    border-radius: 99px; cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 1px;
  }
  .lb-close:hover {
    background: rgba(239,68,68,0.2);
    border-color: #ef4444;
    color: #ef4444;
  }

  /* ══════════════════════════════════════
     MODAL DE CARGA
     ══════════════════════════════════════ */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(15,10,30,0.6);
    backdrop-filter: blur(6px);
    z-index: 300; align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 18px;
    padding: 2rem;
    width: 480px; max-width: 95vw;
    position: relative;
    box-shadow: 0 24px 80px rgba(79,142,247,0.2);
    border: 1.5px solid transparent;
    animation: lbZoomIn 0.3s cubic-bezier(.22,1,.36,1);
  }
  .modal::before {
    content: '';
    position: absolute; inset: -1.5px;
    border-radius: 19px;
    background: var(--grad);
    z-index: -1;
  }

  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.5rem;
  }

  .form-row { margin-bottom: 1rem; }
  .form-row label {
    display: block; font-size: 0.72rem; font-weight: 700;
    color: var(--text-soft); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 0.4rem;
  }
  .form-row input, .form-row select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    padding: 0.55rem 0.85rem;
    border-radius: 10px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-row input:focus, .form-row select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
  }
  .form-row select option { background: var(--surface); }

  .drop-zone {
    border: 2px dashed var(--border);
    padding: 2rem; text-align: center; cursor: pointer;
    border-radius: 12px; transition: all 0.2s; margin-bottom: 1rem;
    position: relative; background: var(--surface2);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--blue);
    background: rgba(79,142,247,0.05);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .drop-text { font-size: 0.82rem; color: var(--text-soft); font-weight: 500; }
  .drop-preview {
    max-width: 100%; max-height: 140px;
    object-fit: contain; display: none;
    margin: 0 auto 0.5rem; border-radius: 8px;
  }

  .modal-actions {
    display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;
  }
  .btn-cancel {
    font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600;
    padding: 0.55rem 1.2rem;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text-mid); cursor: pointer; border-radius: 99px;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: #ef4444; color: #ef4444; }

  .btn-add {
    font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 700;
    padding: 0.55rem 1.5rem;
    background: var(--grad); border: none;
    color: #fff; cursor: pointer; border-radius: 99px;
    box-shadow: 0 4px 14px rgba(79,142,247,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-add:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(79,142,247,0.45);
  }

  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: var(--surface2); border: none;
    color: var(--text-soft); font-size: 1rem;
    width: 28px; height: 28px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  .modal-close:hover { color: #ef4444; }

  /* EMPTY */
  .empty {
    grid-column: 1/-1; text-align: center;
    padding: 4rem 2rem;
    color: var(--text-soft); font-size: 0.82rem;
    font-weight: 600; letter-spacing: 1px;
    border: 2px dashed var(--border); border-radius: 14px;
    background: var(--surface);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5; }

  @media (max-width: 600px) {
    header { padding: 0 1.2rem; }
    .toolbar { padding: 1rem 1.2rem; }
    .gallery-wrap { padding: 1.2rem; }
  }
</style>
</head>
<body>

<!-- ══ PANTALLA DE INICIO ══ -->
<div id="splash">
  <div class="splash-card">
    <div class="splash-avatar">📐</div>
    <div class="splash-name">Piero Gomez Torres</div>
    <div class="splash-sub">Galería de Dibujos Técnicos</div>
    <div class="splash-divider"></div>
    <button class="btn-iniciar" onclick="iniciar()">▶ &nbsp; INICIAR</button>
    <div class="splash-version">v1.0 · Portafolio de Dibujo Técnico</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Piero Gomez Torres
    </div>
    <div class="header-right">
      Galería de Dibujos Técnicos<br>
      <span id="clock"></span>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="toolbar-label">Filtrar</span>
    <div class="categories" id="catBtns"></div>
    <button class="upload-btn" onclick="openModal()">＋ Agregar dibujo</button>
  </div>

  <!-- GALLERY -->
  <div class="gallery-wrap">
    <div class="section-header" id="sectionLabel">Mostrando todos</div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- MODAL -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">Agregar nuevo dibujo</div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        <img class="drop-preview" id="preview">
        <div class="drop-icon" id="dropIcon">📁</div>
        <div class="drop-text" id="dropText">Haz clic o arrastra una imagen aquí</div>
      </div>

      <div class="form-row">
        <label>Título del dibujo</label>
        <input type="text" id="titleInput" placeholder="Ej: Plano de planta — Práctica 03">
      </div>

      <div class="form-row">
        <label>Categoría</label>
        <select id="catSelect">
          <option value="EN CLASE">EN CLASE</option>
          <option value="PRACTICA">PRACTICA</option>
          <option value="AUTOCAD">AUTOCAD</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-add" onclick="addImage()">Agregar →</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">✕ Cerrar</button>
    <div class="lb-img-wrap" onclick="event.stopPropagation()">
      <img class="lb-img" id="lbImg" src="" alt="">
    </div>
    <div class="lb-caption" id="lbCaption"></div>
  </div>

</div>

<script>
  /* ── CLOUDINARY CONFIG ── */
  const CLOUD_NAME   = 'datawa64d';
  const UPLOAD_PRESET = 'Web - Dibujo tecnico';

  const CATEGORIES = ['EN CLASE', 'PRACTICA', 'AUTOCAD'];
  let images = JSON.parse(localStorage.getItem('pg_images_v2') || '[]');
  let activeFilter = 'TODOS';
  let selectedFile = null;

  /* ── INICIO ── */
  function iniciar() {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    renderCatBtns(); renderGrid();
    updateClock(); setInterval(updateClock, 1000);
  }

  /* ── RELOJ ── */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) +
      ' · ' + now.toLocaleDateString('es-PE', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
  }

  function save() { localStorage.setItem('pg_images_v2', JSON.stringify(images)); }

  /* ── CATEGORÍAS ── */
  function renderCatBtns() {
    document.getElementById('catBtns').innerHTML =
      ['TODOS', ...CATEGORIES].map(c => `
        <button class="cat-btn ${activeFilter === c ? 'active' : ''}"
          onclick="setFilter('${c}')">${c}</button>
      `).join('');
  }

  function setFilter(cat) {
    activeFilter = cat;
    renderCatBtns(); renderGrid();
    document.getElementById('sectionLabel').textContent =
      cat === 'TODOS' ? 'Mostrando todos' : `Categoría: ${cat}`;
  }

  /* ── GRID ── */
  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = activeFilter === 'TODOS'
      ? images : images.filter(img => img.category === activeFilter);

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          No hay dibujos en esta categoría<br><br>
          <span style="background:linear-gradient(135deg,#4f8ef7,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;font-weight:700" onclick="openModal()">＋ Agregar primero</span>
        </div>`;
      return;
    }
    grid.innerHTML = filtered.map((img, i) => `
      <div class="card" style="animation-delay:${i * 0.05}s" data-id="${img.id}">
        <div class="card-img-wrap" onclick="openLightbox('${img.id}')">
          <img src="${img.src}" alt="${img.title}" loading="lazy">
        </div>
        <div class="card-info">
          <div class="card-title">${img.title}</div>
          <div class="card-meta">
            <span class="card-cat">${img.category}</span>
            <span class="card-date">${img.date}</span>
          </div>
        </div>
        <div class="delete-hint">Doble clic derecho para eliminar</div>
      </div>
    `).join('');

    // doble clic derecho para eliminar
    let lastRightClick = { id: null, time: 0 };
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('contextmenu', e => {
        e.preventDefault();
        const id = card.dataset.id;
        const now = Date.now();
        if (lastRightClick.id === id && now - lastRightClick.time < 600) {
          if (confirm('¿Eliminar este dibujo?')) {
            images = images.filter(img => img.id !== id);
            save(); renderGrid();
          }
          lastRightClick = { id: null, time: 0 };
        } else {
          lastRightClick = { id, time: now };
          const hint = card.querySelector('.delete-hint');
          hint.classList.add('visible');
          setTimeout(() => hint.classList.remove('visible'), 1400);
        }
      });
    });
  }

  /* ── SELECCIONAR ARCHIVO ── */
  function handleFile(input) {
    const file = input.files[0]; if (!file) return;
    selectedFile = file;
    const preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('dropIcon').style.display = 'none';
    document.getElementById('dropText').textContent = file.name;
  }

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) {
      selectedFile = f;
      const preview = document.getElementById('preview');
      preview.src = URL.createObjectURL(f);
      preview.style.display = 'block';
      document.getElementById('dropIcon').style.display = 'none';
      document.getElementById('dropText').textContent = f.name;
    }
  });

  /* ── SUBIR A CLOUDINARY ── */
  async function addImage() {
    if (!selectedFile) return alert('Selecciona una imagen primero.');
    const title = document.getElementById('titleInput').value.trim() || 'Sin título';
    const cat   = document.getElementById('catSelect').value;

    // mostrar estado de carga
    const btnAdd = document.querySelector('.btn-add');
    btnAdd.textContent = 'Subiendo…';
    btnAdd.disabled = true;

    try {
      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('upload_preset', UPLOAD_PRESET);
      formData.append('folder', 'galeria');

      const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: 'POST', body: formData
      });
      const data = await res.json();

      if (!data.secure_url) throw new Error('Error al subir la imagen');

      const date = new Date().toLocaleDateString('es-PE', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
      images.unshift({ id: Date.now().toString(), src: data.secure_url, title, category: cat, date });
      save(); closeModal(); renderGrid();

    } catch (err) {
      alert('No se pudo subir la imagen. Verifica tu conexión e intenta de nuevo.');
      console.error(err);
    } finally {
      btnAdd.textContent = 'Agregar →';
      btnAdd.disabled = false;
    }
  }

  /* ── MODAL ── */
  function openModal() {
    selectedFile = null;
    document.getElementById('titleInput').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('dropIcon').style.display = 'block';
    document.getElementById('dropText').textContent = 'Haz clic o arrastra una imagen aquí';
    document.getElementById('fileInput').value = '';
    document.getElementById('modalBg').classList.add('open');
  }
  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
  document.getElementById('modalBg').addEventListener('click', e => {
    if (e.target === document.getElementById('modalBg')) closeModal();
  });

  /* ── LIGHTBOX ── */
  function openLightbox(id) {
    const img = images.find(i => i.id === id); if (!img) return;
    const lbImg = document.getElementById('lbImg');
    lbImg.closest('.lb-img-wrap').style.animation = 'none';
    lbImg.closest('.lb-img-wrap').offsetHeight;
    lbImg.closest('.lb-img-wrap').style.animation = '';
    lbImg.src = img.src;
    document.getElementById('lbCaption').textContent = `${img.title} · ${img.category} · ${img.date}`;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeLightbox(); closeModal(); }
  });
</script>
</body>
</html>
