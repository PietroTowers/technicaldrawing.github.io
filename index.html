<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Dibujos Técnicos</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════
     VARIABLES — aquí puedes cambiar colores
     ══════════════════════════════════════ */
  :root {
    --bg:       #0a0e1a;       /* fondo principal */
    --panel:    #0d1525;       /* fondo de tarjetas/modal */
    --blue:     #1a8fff;       /* color de acento principal */
    --blue-dim: #0d4a8a;       /* versión oscura del azul */
    --cyan:     #00e5ff;       /* color de títulos/logo */
    --grid:     rgba(26,143,255,0.08);
    --line:     rgba(26,143,255,0.2);
    --text:     #c8daf0;       /* texto normal */
    --text-dim: #5a7a9a;       /* texto secundario */
    --accent:   #ff6b35;       /* botón de agregar */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    overflow-x: hidden;
  }

  /* ══════════════════════════════════════
     PANTALLA DE INICIO
     ══════════════════════════════════════ */
  #splash {
    position: fixed; inset: 0;
    background: var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.6s ease, visibility 0.6s;
  }
  #splash.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .splash-box {
    text-align: center;
    padding: 3rem 4rem;
    border: 1px solid var(--line);
    background: var(--panel);
    position: relative;
    max-width: 480px;
    width: 90vw;
    animation: splashIn 0.8s ease both;
  }
  @keyframes splashIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* esquinas decorativas */
  .splash-box::before, .splash-box::after,
  .splash-box .c3, .splash-box .c4 {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--cyan);
    border-style: solid;
  }
  .splash-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .splash-box::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .splash-box .c3     { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .splash-box .c4     { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .splash-icon {
    font-size: 3rem;
    margin-bottom: 1.2rem;
    display: block;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .splash-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem;
    color: var(--cyan);
    letter-spacing: 4px;
    margin-bottom: 0.4rem;
  }
  .splash-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 2.5rem;
  }
  .splash-line {
    width: 100%; height: 1px;
    background: var(--line);
    margin-bottom: 2.5rem;
  }

  .btn-iniciar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 4px;
    padding: 0.9rem 3rem;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }
  .btn-iniciar::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: 0;
  }
  .btn-iniciar:hover::before { transform: scaleX(1); }
  .btn-iniciar:hover { color: var(--bg); }
  .btn-iniciar span { position: relative; z-index: 1; }

  .splash-version {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 2rem;
    opacity: 0.5;
  }

  /* ══════════════════════════════════════
     APLICACIÓN PRINCIPAL
     ══════════════════════════════════════ */
  #app { display: none; }
  #app.visible { display: block; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--line);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    background: rgba(10,14,26,0.95);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .logo {
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan);
    font-size: 1.1rem;
    letter-spacing: 2px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    border: 1.5px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .header-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.6;
  }
  #clock { color: var(--blue); }

  /* TOOLBAR */
  .toolbar {
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
  }
  .toolbar-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .categories { display: flex; gap: 0.5rem; flex-wrap: wrap; flex: 1; }

  .cat-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 0.35rem 1.2rem;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    text-transform: uppercase;
  }
  .cat-btn:hover { border-color: var(--blue); color: var(--blue); }
  .cat-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--cyan); }

  .upload-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .upload-btn:hover { background: rgba(255,107,53,0.1); }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--blue);
    padding: 2rem;
    width: 480px;
    max-width: 95vw;
    position: relative;
  }
  .modal-title {
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan);
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 8px;
  }
  .modal-title::before { content: '▸'; color: var(--accent); }

  .form-row { margin-bottom: 1rem; }
  .form-row label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    font-family: 'Share Tech Mono', monospace;
  }
  .form-row input, .form-row select {
    width: 100%;
    background: rgba(26,143,255,0.05);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--blue); }
  .form-row select option { background: var(--panel); }

  .drop-zone {
    border: 2px dashed var(--line);
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1rem;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--blue);
    background: rgba(26,143,255,0.05);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; color: var(--blue-dim); }
  .drop-text { font-size: 0.85rem; color: var(--text-dim); }
  .drop-preview {
    max-width: 100%; max-height: 150px;
    object-fit: contain;
    display: none;
    margin: 0 auto 0.5rem;
  }

  .modal-actions {
    display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;
  }
  .btn-cancel {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; padding: 0.5rem 1rem;
    background: transparent; border: 1px solid var(--line);
    color: var(--text-dim); cursor: pointer;
  }
  .btn-add {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; padding: 0.5rem 1.2rem;
    background: var(--blue-dim); border: 1px solid var(--blue);
    color: var(--cyan); cursor: pointer; transition: background 0.2s;
  }
  .btn-add:hover { background: rgba(26,143,255,0.3); }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: var(--text-dim);
    font-size: 1.2rem; cursor: pointer;
  }

  /* GRID */
  .gallery-wrap { padding: 2rem; }
  .section-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .section-header::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.25s, transform 0.25s;
    animation: cardIn 0.4s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover { border-color: var(--blue); transform: translateY(-3px); }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--blue);
    opacity: 0; transition: opacity 0.25s;
  }
  .card:hover::before { opacity: 1; }

  .card-img-wrap {
    width: 100%; aspect-ratio: 4/3;
    overflow: hidden;
    background: #060a14;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    transition: transform 0.35s;
    padding: 8px;
  }
  .card:hover .card-img-wrap img { transform: scale(1.04); }

  .card-info { padding: 0.75rem 1rem; border-top: 1px solid var(--line); }
  .card-title {
    font-weight: 700; font-size: 0.95rem; color: var(--text);
    margin-bottom: 0.3rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { display: flex; justify-content: space-between; align-items: center; }
  .card-cat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; color: var(--blue);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .card-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; color: var(--text-dim);
  }
  .card-delete {
    position: absolute; top: 6px; right: 6px;
    background: rgba(10,14,26,0.85);
    border: 1px solid var(--line); color: var(--text-dim);
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; cursor: pointer;
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: var(--accent); border-color: var(--accent); }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.95); z-index: 300;
    align-items: center; justify-content: center; flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lb-img { max-width: 90vw; max-height: 80vh; object-fit: contain; border: 1px solid var(--blue); }
  .lb-caption {
    margin-top: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem; color: var(--text-dim); letter-spacing: 2px;
  }
  .lb-close {
    position: fixed; top: 1.5rem; right: 1.5rem;
    background: none; border: 1px solid var(--line);
    color: var(--text-dim); font-size: 1rem;
    padding: 0.4rem 0.8rem; cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
  }
  .lb-close:hover { border-color: var(--accent); color: var(--accent); }

  /* EMPTY */
  .empty {
    grid-column: 1/-1; text-align: center;
    padding: 4rem 2rem; color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem; letter-spacing: 1px;
    border: 1px dashed var(--line);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }

  .corner-deco {
    position: fixed; pointer-events: none;
    width: 60px; height: 60px;
    border-color: rgba(26,143,255,0.15); border-style: solid;
  }
  .corner-deco.tl { top: 70px; left: 0; border-width: 1px 0 0 1px; }
  .corner-deco.tr { top: 70px; right: 0; border-width: 1px 1px 0 0; }
  .corner-deco.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
  .corner-deco.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

  @media (max-width: 600px) {
    .toolbar { padding: 1rem; }
    .gallery-wrap { padding: 1rem; }
    header { padding: 0 1rem; }
    .splash-box { padding: 2rem 1.5rem; }
    .splash-title { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- ══ PANTALLA DE INICIO ══ -->
<div id="splash">
  <div class="splash-box">
    <div class="c3"></div><div class="c4"></div>
    <span class="splash-icon">📐</span>
    <div class="splash-title">DRAFTVAULT</div>
    <div class="splash-sub">GALERÍA DE DIBUJOS TÉCNICOS</div>
    <div class="splash-line"></div>
    <button class="btn-iniciar" onclick="iniciar()">
      <span>▶ &nbsp; INICIAR</span>
    </button>
    <div class="splash-version">v1.0 · SISTEMA DE ARCHIVOS GRÁFICOS</div>
  </div>
</div>

<!-- ══ APLICACIÓN PRINCIPAL ══ -->
<div id="app">

  <div class="corner-deco tl"></div>
  <div class="corner-deco tr"></div>
  <div class="corner-deco bl"></div>
  <div class="corner-deco br"></div>

  <header>
    <div class="logo">
      <div class="logo-icon">⌖</div>
      DRAFTVAULT
    </div>
    <div class="header-meta">
      GALERÍA DE DIBUJOS TÉCNICOS<br>
      <span id="clock"></span>
    </div>
  </header>

  <div class="toolbar">
    <span class="toolbar-label">FILTRAR //</span>
    <div class="categories" id="catBtns"></div>
    <button class="upload-btn" onclick="openModal()">⊕ AGREGAR DIBUJO</button>
  </div>

  <div class="gallery-wrap">
    <div class="section-header" id="sectionLabel">MOSTRANDO TODOS</div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- MODAL -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">AGREGAR NUEVO DIBUJO</div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        <img class="drop-preview" id="preview">
        <div class="drop-icon" id="dropIcon">📐</div>
        <div class="drop-text" id="dropText">Haz clic o arrastra una imagen aquí</div>
      </div>

      <div class="form-row">
        <label>Título del dibujo</label>
        <input type="text" id="titleInput" placeholder="Ej: Plano de planta — Práctica 03">
      </div>

      <div class="form-row">
        <label>Categoría</label>
        <select id="catSelect">
          <option value="EN CLASE">EN CLASE</option>
          <option value="PRACTICA">PRACTICA</option>
          <option value="AUTOCAD">AUTOCAD</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">CANCELAR</button>
        <button class="btn-add" onclick="addImage()">AGREGAR ▸</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">✕ CERRAR</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-caption" id="lbCaption"></div>
  </div>

</div>

<script>
  const CATEGORIES = ['EN CLASE', 'PRACTICA', 'AUTOCAD'];
  let images = JSON.parse(localStorage.getItem('draftvault_images') || '[]');
  let activeFilter = 'TODOS';
  let currentFile = null;

  function iniciar() {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    renderCatBtns();
    renderGrid();
    updateClock();
    setInterval(updateClock, 1000);
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) +
      ' · ' + now.toLocaleDateString('es-PE', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
  }

  function save() { localStorage.setItem('draftvault_images', JSON.stringify(images)); }

  function renderCatBtns() {
    document.getElementById('catBtns').innerHTML =
      ['TODOS', ...CATEGORIES].map(c => `
        <button class="cat-btn ${activeFilter === c ? 'active' : ''}"
          onclick="setFilter('${c}')">${c}</button>
      `).join('');
  }

  function setFilter(cat) {
    activeFilter = cat;
    renderCatBtns();
    renderGrid();
    document.getElementById('sectionLabel').textContent =
      cat === 'TODOS' ? 'MOSTRANDO TODOS' : `CATEGORÍA // ${cat}`;
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = activeFilter === 'TODOS'
      ? images
      : images.filter(img => img.category === activeFilter);

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          NO HAY DIBUJOS EN ESTA CATEGORÍA<br><br>
          <span style="color:var(--blue);cursor:pointer" onclick="openModal()">⊕ AGREGAR PRIMERO</span>
        </div>`;
      return;
    }
    grid.innerHTML = filtered.map((img, i) => `
      <div class="card" style="animation-delay:${i * 0.05}s">
        <button class="card-delete" onclick="deleteImg(event,'${img.id}')">✕</button>
        <div class="card-img-wrap" onclick="openLightbox('${img.id}')">
          <img src="${img.src}" alt="${img.title}" loading="lazy">
        </div>
        <div class="card-info">
          <div class="card-title">${img.title}</div>
          <div class="card-meta">
            <span class="card-cat">${img.category}</span>
            <span class="card-date">${img.date}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      currentFile = e.target.result;
      const preview = document.getElementById('preview');
      preview.src = currentFile;
      preview.style.display = 'block';
      document.getElementById('dropIcon').style.display = 'none';
      document.getElementById('dropText').textContent = file.name;
    };
    reader.readAsDataURL(file);
  }

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) {
      const r = new FileReader();
      r.onload = ev => {
        currentFile = ev.target.result;
        const preview = document.getElementById('preview');
        preview.src = currentFile; preview.style.display = 'block';
        document.getElementById('dropIcon').style.display = 'none';
        document.getElementById('dropText').textContent = f.name;
      };
      r.readAsDataURL(f);
    }
  });

  function addImage() {
    if (!currentFile) return alert('Selecciona una imagen primero.');
    const title = document.getElementById('titleInput').value.trim() || 'Sin título';
    const cat   = document.getElementById('catSelect').value;
    const date  = new Date().toLocaleDateString('es-PE', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
    images.unshift({ id: Date.now().toString(), src: currentFile, title, category: cat, date });
    save(); closeModal(); renderGrid();
  }

  function deleteImg(e, id) {
    e.stopPropagation();
    if (!confirm('¿Eliminar este dibujo?')) return;
    images = images.filter(img => img.id !== id);
    save(); renderGrid();
  }

  function openModal() {
    currentFile = null;
    document.getElementById('titleInput').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('dropIcon').style.display = 'block';
    document.getElementById('dropText').textContent = 'Haz clic o arrastra una imagen aquí';
    document.getElementById('fileInput').value = '';
    document.getElementById('modalBg').classList.add('open');
  }
  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
  document.getElementById('modalBg').addEventListener('click', e => {
    if (e.target === document.getElementById('modalBg')) closeModal();
  });

  function openLightbox(id) {
    const img = images.find(i => i.id === id);
    if (!img) return;
    document.getElementById('lbImg').src = img.src;
    document.getElementById('lbCaption').textContent = `${img.title} // ${img.category} // ${img.date}`;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeLightbox(); closeModal(); }
  });
</script>
</body>
</html>
